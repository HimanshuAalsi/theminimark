<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="The Minimark is temporarily offline for updates. We'll be back shortly."
    />
    <title>The Minimark — Back soon</title>
    <link rel="icon" type="image/webp" href="/main-logo.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      :root {
        --accent: #2d5c52;
        --accent-deep: #1a4a42;
        --accent-soft: rgba(45, 92, 82, 0.14);
        --ink: #1c2421;
        --ink-muted: #5c6b66;
        --paper: #f7f4ef;
        --paper-elevated: #fffcf7;
        --border: rgba(28, 36, 33, 0.1);
        --shadow: 0 24px 64px rgba(28, 36, 33, 0.1);
        --font-display: 'Fraunces', Georgia, serif;
        --font-body: 'DM Sans', system-ui, sans-serif;
      }

      html {
        height: 100%;
      }

      body {
        margin: 0;
        min-height: 100%;
        font-family: var(--font-body);
        color: var(--ink);
        background: var(--paper);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
      }

      .bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        overflow: hidden;
        background:
          radial-gradient(ellipse 90% 70% at 10% 0%, rgba(45, 92, 82, 0.12), transparent 55%),
          radial-gradient(ellipse 70% 60% at 100% 100%, rgba(180, 150, 110, 0.14), transparent 50%),
          linear-gradient(165deg, #faf7f2 0%, var(--paper) 45%, #f0ebe3 100%);
      }

      .bg__grain {
        position: absolute;
        inset: 0;
        opacity: 0.35;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
        pointer-events: none;
      }

      .bg__orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(72px);
        animation: drift 18s ease-in-out infinite alternate;
      }

      .bg__orb--1 {
        width: 320px;
        height: 320px;
        top: -8%;
        right: 8%;
        background: rgba(45, 92, 82, 0.2);
      }

      .bg__orb--2 {
        width: 280px;
        height: 280px;
        bottom: 5%;
        left: -5%;
        background: rgba(210, 175, 130, 0.25);
        animation-delay: -6s;
        animation-duration: 22s;
      }

      @keyframes drift {
        from {
          transform: translate(0, 0) scale(1);
        }
        to {
          transform: translate(-24px, 18px) scale(1.06);
        }
      }

      .page {
        position: relative;
        z-index: 1;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.25rem 3rem;
      }

      .card {
        width: min(100%, 520px);
        padding: clamp(2rem, 5vw, 2.75rem) clamp(1.5rem, 4vw, 2.5rem);
        background: var(--paper-elevated);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: var(--shadow);
        text-align: center;
        animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo-wrap {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 88px;
        height: 88px;
        margin-bottom: 1.25rem;
        border-radius: 50%;
        background: var(--accent-soft);
        box-shadow: 0 8px 28px rgba(45, 92, 82, 0.15);
      }

      .logo-wrap img {
        width: 56px;
        height: 56px;
        object-fit: contain;
      }

      .logo-mark {
        display: none;
        font-family: var(--font-display);
        font-size: 2rem;
        font-weight: 500;
        color: var(--accent);
        letter-spacing: -0.02em;
      }

      .logo-wrap.is-fallback .logo-mark {
        display: block;
      }

      .logo-wrap.is-fallback img {
        display: none;
      }

      .eyebrow {
        margin: 0 0 0.5rem;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-family: var(--font-display);
        font-size: clamp(1.75rem, 5vw, 2.25rem);
        font-weight: 500;
        line-height: 1.2;
        letter-spacing: -0.02em;
        color: var(--ink);
      }

      .lead {
        margin: 0 auto 1.75rem;
        max-width: 36ch;
        font-size: 1.05rem;
        color: var(--ink-muted);
      }

      .progress {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        margin-bottom: 1.75rem;
      }

      .progress__dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--accent);
        opacity: 0.35;
        animation: pulse 1.4s ease-in-out infinite;
      }

      .progress__dot:nth-child(2) {
        animation-delay: 0.2s;
      }

      .progress__dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes pulse {
        0%,
        80%,
        100% {
          opacity: 0.3;
          transform: scale(0.85);
        }
        40% {
          opacity: 1;
          transform: scale(1);
        }
      }

      .contact {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.65rem 1.25rem;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), var(--accent-deep));
        color: #fff !important;
        font-weight: 600;
        font-size: 0.95rem;
        text-decoration: none;
        box-shadow: 0 6px 20px rgba(45, 92, 82, 0.28);
        transition:
          transform 0.2s ease,
          filter 0.2s ease;
      }

      .contact:hover {
        filter: brightness(1.06);
        transform: translateY(-2px);
      }

      .contact:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
      }

      .contact svg {
        flex-shrink: 0;
      }

      .footer {
        margin-top: 2rem;
        font-size: 0.85rem;
        color: var(--ink-muted);
        animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.15s both;
      }

      .footer time {
        font-weight: 600;
        color: var(--ink);
      }

      @media (prefers-reduced-motion: reduce) {
        .bg__orb,
        .progress__dot,
        .card,
        .footer {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <div class="bg__grain"></div>
      <div class="bg__orb bg__orb--1"></div>
      <div class="bg__orb bg__orb--2"></div>
    </div>

    <main class="page">
      <article class="card">
        <div class="logo-wrap">
          <img
            src="/main-logo.webp"
            alt=""
            width="56"
            height="56"
            onerror="this.closest('.logo-wrap')?.classList.add('is-fallback');"
          />
          <span class="logo-mark" aria-hidden="true">M</span>
        </div>

        <p class="eyebrow">We'll be right back</p>
        <h1>Polishing the shelves</h1>
        <p class="lead">
          The Minimark is taking a short pause while we update the shop. Thank you for your patience —
          bookmarks, gifts, and paper goods return soon.
        </p>

        <div class="progress" aria-hidden="true">
          <span class="progress__dot"></span>
          <span class="progress__dot"></span>
          <span class="progress__dot"></span>
        </div>

        <a class="contact" href="mailto:hello@theminimark.com">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <polyline points="22,6 12,13 2,6" />
          </svg>
          hello@theminimark.com
        </a>
      </article>

      <p class="footer">
        <span>The Minimark</span>
        ·
        <time id="year"></time>
      </p>
    </main>

    <script>
      document.getElementById('year').textContent = new Date().getFullYear()
    </script>
  </body>
</html>
