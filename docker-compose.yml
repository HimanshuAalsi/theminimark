# MySQL runs schema.sql + seed.sql only on first volume create. To reload seed after edits:
#   docker compose down -v && docker compose up -d   (wipes DB)
#   or import backend/sql/seed.sql into the running db container (see backend/README.md).
services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: theminimark
    ports:
      - '3307:3306'
    volumes:
      - theminimark_mysql:/var/lib/mysql
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/sql/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot']
      interval: 4s
      timeout: 5s
      retries: 30
      start_period: 15s

  api:
    build: ./backend/docker/php
    working_dir: /app
    ports:
      - '8888:8888'
    volumes:
      - ./backend/api:/app
      - ./backend/docker/config.local.php:/app/config.local.php:ro
    depends_on:
      db:
        condition: service_healthy
    command: ['php', '-S', '0.0.0.0:8888']

volumes:
  theminimark_mysql:
